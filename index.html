<!DOCTYPE html>

<head>

<body class="tema-matrix">

<header id="barradecima">
<h1 class="h1machine">MATRIX MACHINE</h1>

    <option value="0" disabled selected hidden>Escolha o tema</option>
    <option value="matrix">Matrix</option>
    <option value="claro">Claro</option>
    <option value="escuro">Escuro</option>
</select>
</header>

<main id="quadradoinputs">
<h3 class="h3machine">Digite um número decimal:</h3>
<input class="inputmachine" id="demo1" type="text" placeholder="Ex: 42">
<button class="botaomachine" onclick="converter()">Converter</button>

    <h3 class="h3machine">Resultados:</h3>
    <p>Octal: <span id="demo2"></span></p>
    <p>Hexadecimal: <span id="demo3"></span></p>
    <p>Binário: <span id="demo4"></span></p>
</main>

</body>
